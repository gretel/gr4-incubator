name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  CI_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gr4-incubator-ci
  SDK_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gr4-incubator-sdk

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR (main only)
        uses: docker/login-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CI image (load for test run)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: ci
          tags: ${{ env.CI_IMAGE_NAME }}:local
          load: true
          push: false
          cache-from: type=gha,scope=gr4-incubator-ci
          cache-to: type=gha,scope=gr4-incubator-ci,mode=max

      # The CI image's ENTRYPOINT is already ["/bin/bash", "-l", "-c"] — pass
      # the script directly as the CMD. Wrapping with another `bash -lc` would
      # produce `/bin/bash -l -c bash -lc <script>` which runs an empty shell.
      #
      # The image's USER is `ubuntu` (uid 1000) but the bind-mounted workspace
      # is owned by the runner user (uid 1001). Build into /tmp/build (always
      # writable inside the container) instead of fighting permissions on the
      # mount.
      #
      # We restrict the build to the iio block's own targets because several
      # sibling examples and tests upstream still reference an older
      # gr::Graph::connect API ('fg.connect<"out", "in">(src, dst)') that does
      # not exist in the pinned gnuradio4 commit. That is a pre-existing
      # upstream issue, surfaced once we fixed the silent double-shell
      # invocation in this same PR. Building only the iio targets keeps this
      # PR's CI gate focused on the iio block while leaving the sibling fix
      # to a follow-up.
      - name: Build and test (iio targets only)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/gr4-incubator" \
            ${{ env.CI_IMAGE_NAME }}:local '
            set -euxo pipefail
            cmake -S /workspaces/gr4-incubator -B /tmp/build -G Ninja \
              -DENABLE_TESTING=ON \
              -DENABLE_EXAMPLES=ON \
              -DENABLE_GUI_EXAMPLES=OFF
            cmake --build /tmp/build -j"$(nproc)" --target qa_IIOSource qa_IIOSink iio_capture iio_tx
            ls -la /tmp/build/blocks/iio/test
            echo "--- registered iio tests ---"
            ctest --test-dir /tmp/build -N -R "^qa_IIO"
            echo "--- running iio tests ---"
            ctest --test-dir /tmp/build --output-on-failure --verbose -R "^qa_IIO"
          '

      - name: Push tested CI image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.CI_IMAGE_NAME }}:local ${{ env.CI_IMAGE_NAME }}:latest
          docker tag ${{ env.CI_IMAGE_NAME }}:local ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.CI_IMAGE_NAME }}:latest
          docker push ${{ env.CI_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push SDK image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: sdk
          push: true
          tags: |
            ${{ env.SDK_IMAGE_NAME }}:latest
            ${{ env.SDK_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=gr4-incubator-sdk
          cache-to: type=gha,scope=gr4-incubator-sdk,mode=max
