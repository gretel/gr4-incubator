# prek (pre-commit) configuration for gr4-incubator — block-schema-lint.
# Run with: prek run --all-files  or  prek run block-schema-lint

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: block-schema-lint
        name: block schema lint (clang)
        description: Scan + validate GR4 block headers via clang AST
        entry: bash -c 'cd tools/block-schema-lint && uv run scan_blocks.py ../../blocks/*/include/gnuradio-4.0/*/*.hpp --validate'
        language: system
        pass_filenames: false
        always_run: true

